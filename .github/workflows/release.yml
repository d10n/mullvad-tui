name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Stamp Cargo.toml so cargo-deb / cargo-generate-rpm pick up the tag version.
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" mullvad-tui/Cargo.toml

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "25.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        shell: bash
        run: |
          toolchain=$(rustup show active-toolchain | awk '{print $1}')
          rustup toolchain install "$toolchain" --profile minimal --target x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release -p mullvad-tui --locked

      - name: Build statically linked release binary
        env:
          CC: musl-gcc
        run: cargo build --release -p mullvad-tui --target x86_64-unknown-linux-musl --locked

      - name: Install packagers
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build .deb
        run: |
          cargo deb -p mullvad-tui --no-build --no-strip \
            --output target/mullvad-tui_${{ steps.version.outputs.version }}_amd64.deb

      - name: Build .rpm
        run: |
          cargo generate-rpm -p mullvad-tui \
            --output target/mullvad-tui-${{ steps.version.outputs.version }}-1.x86_64.rpm

      - name: Generate build provenance attestations
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            target/x86_64-unknown-linux-musl/release/mullvad-tui
            target/*.deb
            target/*.rpm

      - name: Stage release assets
        id: stage
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/*.deb target/*.rpm dist/
          install -m 0755 \
            target/x86_64-unknown-linux-musl/release/mullvad-tui \
            "dist/mullvad-tui-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl"
          # Include the Sigstore attestation bundle alongside the artifacts.
          cp "$BUNDLE_PATH" "dist/mullvad-tui-${{ steps.version.outputs.version }}.attestation.sigstore.json"
          ( cd dist && sha256sum -- * > ../SHA256SUMS && mv ../SHA256SUMS . )
          ls -l dist

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-packages
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          #generate_release_notes: true
